name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --no-plugins
      - name: Unit tests
        run: composer test
      - name: Scrub check (no em-dash)
        run: composer scrub:check

  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --no-progress
      - name: WordPress coding standards (security + i18n)
        run: composer phpcs
